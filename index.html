<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatolicosGPT — Asistente Teológico Católico</title>

<meta name="description" content="Tu asistente de fe católica con IA. Teología, oraciones, santos, apariciones marianas y más.">
<meta name="robots" content="index, follow">
<meta name="author" content="CatolicosGPT">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&family=Inter&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
margin:0;
background:#FAF7F0;
}

.shell{
display:flex;
height:100vh;
}

.sb{
width:260px;
background:#F2EAD8;
padding:10px;
}

.sb-item{
display:flex;
gap:10px;
padding:10px;
cursor:pointer;
}

.sb-item:hover{
background:#E8DCC4;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat-inner{
padding:20px;
overflow:auto;
flex:1;
}

.msg{
margin-bottom:16px;
}

.bubble{
background:white;
padding:14px;
border-radius:8px;
}

.bubble.usr{
background:#5C3D1E;
color:white;
}

.input-area{
padding:15px;
border-top:1px solid #ddd;
}

textarea{
width:100%;
padding:10px;
}

button{
padding:10px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="shell">

<nav class="sb">

<div class="sb-item" onclick="loadLecturas()">
📖 Lecturas del día
</div>

<div class="sb-item" onclick="loadLaudes()">
🕯 Liturgia de las Horas
</div>

<div class="sb-item" onclick="loadRosario()">
📿 Santo Rosario
</div>

<div class="sb-item" onclick="loadSanto()">
☩ Santos
</div>

<div class="sb-item" onclick="window.open('https://www.vatican.va')">
🌐 Vatican.va
</div>

<hr>

<div class="sb-item" onclick="openDonate()">
🤲 Apoya CatolicosGPT
</div>

</nav>

<div class="main">

<div class="chat-inner" id="chat-inner"></div>

<div class="input-area">

<textarea id="cin"></textarea>

<button onclick="send()">Enviar</button>

</div>

</div>

</div>

<script>

let isLoading=false
let chatHistory=[]


// ============================
// RENDER CHAT
// ============================

function renderBubble(text,isUser=false){

const chat=document.getElementById("chat-inner")

const wrap=document.createElement("div")
wrap.className="msg"

const bubble=document.createElement("div")
bubble.className="bubble "+(isUser?"usr":"")

bubble.innerHTML=text.replace(/\n/g,"<br>")

wrap.appendChild(bubble)

chat.appendChild(wrap)

chat.scrollTop=chat.scrollHeight

}


// ============================
// CHAT IA
// ============================

async function send(){

const input=document.getElementById("cin")
const text=input.value.trim()

if(!text||isLoading)return

isLoading=true

renderBubble(text,true)

chatHistory.push({role:"user",content:text})

input.value=""

try{

const r=await fetch("/api/chat",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({messages:chatHistory})
})

const data=await r.json()

renderBubble(data.reply)

chatHistory.push({role:"assistant",content:data.reply})

}catch(e){

renderBubble("Error al conectar con CatolicosGPT")

}

isLoading=false

}



// ============================
// LECTURAS
// ============================

async function loadLecturas(){

const r=await fetch("/api/lecturas")
const data=await r.json()

renderBubble(`
📖 <b>LECTURAS DEL DÍA</b>

<b>Primera lectura</b>

${data.first_reading}

<b>Salmo</b>

${data.psalm}

<b>Evangelio</b>

${data.gospel}
`)

}


// ============================
// LAUDES
// ============================

async function loadLaudes(){

const r=await fetch("/api/laudes")
const data=await r.json()

renderBubble(`
🕯 <b>LITURGIA DE LAS HORAS – LAUDES</b>

${data.laudes}
`)

}


// ============================
// ROSARIO
// ============================

async function loadRosario(){

const r=await fetch("/api/rosario")
const data=await r.json()

renderBubble(data.rosario)

}


// ============================
// SANTO DEL DIA
// ============================

async function loadSanto(){

const r=await fetch("/api/santo")
const data=await r.json()

renderBubble(`
☩ <b>SANTO DEL DÍA</b>

${data.santo}
`)

}


// ============================
// DONACIONES
// ============================

function openDonate(){

window.open("https://www.paypal.com/paypalme/schoolmarketing")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatolicosGPT — Asistente Teológico Católico</title>

<meta name="description" content="Tu asistente de fe católica con IA. Teología, oraciones, santos, apariciones marianas y más.">
<meta name="robots" content="index, follow">
<meta name="author" content="CatolicosGPT">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&family=Inter&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
margin:0;
background:#FAF7F0;
}

.shell{
display:flex;
height:100vh;
}

.sb{
width:260px;
background:#F2EAD8;
padding:10px;
}

.sb-item{
display:flex;
gap:10px;
padding:10px;
cursor:pointer;
}

.sb-item:hover{
background:#E8DCC4;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat-inner{
padding:20px;
}

.msg{
margin-bottom:16px;
}

.bubble{
background:white;
padding:14px;
border-radius:8px;
}

.bubble.usr{
background:#5C3D1E;
color:white;
}

.input-area{
padding:15px;
border-top:1px solid #ddd;
}

textarea{
width:100%;
padding:10px;
}

</style>

</head>

<body>

<div class="shell">

<nav class="sb">

<div class="sb-item" onclick="loadLecturas();closeSb()"
>
📖 Lecturas del día
</div>

<div class="sb-item" onclick="loadLaudes();closeSb()"
>
🕯 Liturgia de las Horas
</div>

<div class="sb-item" onclick="loadRosario();closeSb()"
>
📿 Santo Rosario
</div>

<div class="sb-item" onclick="sendChip('¿Quién es el santo del día de hoy?')">
☩ Santos
</div>

<div class="sb-item" onclick="window.open('https://www.vatican.va')">
🌐 Vatican.va
</div>

<hr>

<div class="sb-item" onclick="openDonate()">
🤲 Apoya CatolicosGPT
</div>

</nav>

<div class="main">

<div class="chat-inner" id="chat"></div>

<div class="input-area">

<textarea id="input"></textarea>

<button onclick="send()">Enviar</button>

</div>

</div>

</div>

<script>

// ============================
// ESTADO
// ============================

let isLoading = false
let chatHistory = []


// ============================
// RENDER BURBUJAS CHAT
// ============================

function renderBubble(text,isUser=false){

const chat=document.getElementById("chat-inner")
document.getElementById("welcome").style.display="none"
document.getElementById("chat-area").style.display="block"

const wrap=document.createElement("div")
wrap.className="msg"+(isUser?" u":"")

const avatar=document.createElement("div")
avatar.className="av "+(isUser?"usr":"bot")
avatar.innerHTML=isUser?"TÚ":"✝"

const bubble=document.createElement("div")
bubble.className="bubble "+(isUser?"usr":"bot")

const formatted=text
.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
.replace(/\*(.*?)\*/g,"<em>$1</em>")
.replace(/\n/g,"<br>")

bubble.innerHTML=formatted

wrap.appendChild(avatar)
wrap.appendChild(bubble)

chat.appendChild(wrap)

chat.scrollTop=chat.scrollHeight

}



// ============================
// INDICADOR ESCRIBIENDO
// ============================

function typing(){

const chat=document.getElementById("chat-inner")

const wrap=document.createElement("div")
wrap.className="msg"
wrap.id="typing"

wrap.innerHTML=`
<div class="av bot">✝</div>
<div class="bubble bot typing">
<span></span><span></span><span></span>
</div>
`

chat.appendChild(wrap)
chat.scrollTop=chat.scrollHeight

}

function removeTyping(){

const t=document.getElementById("typing")
if(t)t.remove()

}



// ============================
// CHAT IA
// ============================

async function send(){

const input=document.getElementById("cin")
const text=input.value.trim()

if(!text||isLoading)return

isLoading=true

renderBubble(text,true)

chatHistory.push({role:"user",content:text})

input.value=""

typing()

try{

const r=await fetch("/api/chat",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({messages:chatHistory})
})

const data=await r.json()

removeTyping()

renderBubble(data.reply)

chatHistory.push({role:"assistant",content:data.reply})

}catch(e){

removeTyping()
renderBubble("Error al conectar con CatolicosGPT")

}

isLoading=false

}



// ============================
// LECTURAS DEL DIA
// ============================

async function loadLecturas(){

try{

typing()

const r=await fetch("/api/lecturas")

const data=await r.json()

removeTyping()

const texto=`

📖 **LECTURAS DEL DÍA**

**Primera lectura**

${data.first_reading}

**Salmo**

${data.psalm}

**Evangelio**

${data.gospel}

`

renderBubble(texto,false)

}catch(e){

removeTyping()

renderBubble("No se pudieron cargar las lecturas del día.")

}

}



// ============================
// LITURGIA DE LAS HORAS
// ============================

async function loadLaudes(){

try{

typing()

const r=await fetch("/api/laudes")

const data=await r.json()

removeTyping()

const texto=`

🕯 **LITURGIA DE LAS HORAS – LAUDES**

${data.laudes}

`

renderBubble(texto,false)

}catch(e){

removeTyping()

renderBubble("No se pudo cargar la Liturgia de las Horas.")

}

}



// ============================
// ROSARIO
// ============================

async function loadRosario(){

try{

typing()

const r=await fetch("/api/rosario")

const data=await r.json()

removeTyping()

renderBubble(data.rosario,false)

}catch(e){

removeTyping()

renderBubble("No se pudo cargar el Rosario.")

}

}



// ============================
// INPUT ENTER
// ============================

function onKey(e){

if(e.key==="Enter"&&!e.shiftKey){

e.preventDefault()

send()

}

}



// ============================
// NUEVO CHAT
// ============================

function newChat(){

chatHistory=[]

document.getElementById("chat-inner").innerHTML=""

document.getElementById("welcome").style.display="flex"

document.getElementById("chat-area").style.display="none"

}



// ============================
// SIDEBAR
// ============================

function closeSb(){

document.getElementById("sb").classList.remove("open")

document.getElementById("overlay").classList.remove("show")

}

function toggleSb(){

document.getElementById("sb").classList.toggle("open")

document.getElementById("overlay").classList.toggle("show")

}



// ============================
// DONACIONES
// ============================

function openDonate(){

document.getElementById("donate-modal").classList.add("show")

}

function closeDonate(){

document.getElementById("donate-modal").classList.remove("show")

}

</script>


</body>
</html>

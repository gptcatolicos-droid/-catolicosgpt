<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CatolicosGPT — Asistente Teológico Católico</title>

<meta name="description" content="Tu asistente de fe católica con IA. Teología, oraciones, santos, apariciones marianas y más.">
<meta name="robots" content="index, follow">
<meta name="author" content="CatolicosGPT">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&family=Inter&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
margin:0;
background:#FAF7F0;
}

.shell{
display:flex;
height:100vh;
}

.sb{
width:260px;
background:#F2EAD8;
padding:10px;
}

.sb-item{
display:flex;
gap:10px;
padding:10px;
cursor:pointer;
}

.sb-item:hover{
background:#E8DCC4;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat-inner{
padding:20px;
}

.msg{
margin-bottom:16px;
}

.bubble{
background:white;
padding:14px;
border-radius:8px;
}

.bubble.usr{
background:#5C3D1E;
color:white;
}

.input-area{
padding:15px;
border-top:1px solid #ddd;
}

textarea{
width:100%;
padding:10px;
}

</style>

</head>

<body>

<div class="shell">

<nav class="sb">

<div class="sb-item" onclick="loadLecturas()">
📖 Lecturas del día
</div>

<div class="sb-item" onclick="loadLaudes()">
🕯 Liturgia de las Horas
</div>

<div class="sb-item" onclick="loadRosario()">
📿 Santo Rosario
</div>

<div class="sb-item" onclick="sendChip('¿Quién es el santo del día de hoy?')">
☩ Santos
</div>

<div class="sb-item" onclick="window.open('https://www.vatican.va')">
🌐 Vatican.va
</div>

<hr>

<div class="sb-item" onclick="openDonate()">
🤲 Apoya CatolicosGPT
</div>

</nav>

<div class="main">

<div class="chat-inner" id="chat"></div>

<div class="input-area">

<textarea id="input"></textarea>

<button onclick="send()">Enviar</button>

</div>

</div>

</div>

<script>

const PAYPAL_URL="https://www.paypal.com/paypalme/schoolmarketing"

let chat=document.getElementById("chat")

function renderBubble(text,user=false){

let div=document.createElement("div")
div.className="msg"

let bubble=document.createElement("div")
bubble.className="bubble"

if(user) bubble.className+=" usr"

bubble.innerHTML=text.replace(/\n/g,"<br>")

div.appendChild(bubble)

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function send(){

let input=document.getElementById("input")

let val=input.value.trim()

if(!val)return

renderBubble(val,true)

input.value=""

fetch("/api/chat",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({messages:[{role:"user",content:val}]})
})
.then(r=>r.json())
.then(d=>{

renderBubble(d.reply)

})

}

function sendChip(text){

renderBubble(text,true)

fetch("/api/chat",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({messages:[{role:"user",content:text}]})
})
.then(r=>r.json())
.then(d=>{

renderBubble(d.reply)

})

}

async function loadLecturas(){

renderBubble("📖 Cargando lecturas del día...")

try{

const res=await fetch("/api/lecturas")

const data=await res.json()

const texto=`

📖 **Lecturas del día**

Primera lectura  
${data.first_reading}

Salmo  
${data.psalm}

Evangelio  
${data.gospel}

`

renderBubble(texto)

}catch(e){

renderBubble("No se pudieron cargar las lecturas.")

}

}

function loadLaudes(){

const texto=`

🕯 **Laudes — Oración de la mañana**

Señor, abre mis labios  
y mi boca proclamará tu alabanza.

---

**Himno**

Oh Dios, ven en mi ayuda  
Señor date prisa en socorrerme

---

**Salmo**

Alaben al Señor desde los cielos  
alábenlo en las alturas

---

**Lectura breve**

Bendito sea Dios Padre  
que nos bendijo en Cristo

---

**Cántico de Zacarías**

Bendito sea el Señor Dios de Israel  
porque visitó y redimió a su pueblo

---

**Padre Nuestro**

Padre nuestro que estás en el cielo...

---

**Oración**

Señor Dios  
dirige y santifica este día

Amén

`

renderBubble(texto)

}

function loadRosario(){

const texto=`

📿 **Santo Rosario**

Señal de la cruz

En el nombre del Padre  
del Hijo  
y del Espíritu Santo

---

**Credo**

Creo en Dios Padre Todopoderoso

---

**Padre Nuestro**

Padre nuestro que estás en el cielo

---

**3 Avemarías**

Dios te salve María

---

**Misterios del día**

Lunes / Sábado → Gozosos  
Martes / Viernes → Dolorosos  
Miércoles / Domingo → Gloriosos  
Jueves → Luminosos

---

**Salve**

Dios te salve Reina y Madre

Amén

`

renderBubble(texto)

}

function openDonate(){

window.open(PAYPAL_URL)

}

</script>

</body>
</html>
